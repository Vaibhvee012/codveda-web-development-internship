<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>WEEKLY TO-DO TASKS</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

  <!-- Navbar -->

  <header class="navbar">
    
    <h2>Hello, User!</h2>

    <h1>WEEKLY TO-DO TASKS</h1>

    
    <button id="addTaskBtn">+ Add Task</button>

  </header>

  <!-- Board -->

  <section class="board">

    <!-- Monday -->

    <div class="column">

      <h2>Monday</h2>

      <div class="task-list" id="monday"></div>

    </div>

    <!-- Tuesday -->

    <div class="column">

      <h2>Tuesday</h2>

      <div class="task-list" id="tuesday"></div>

    </div>

    <!-- Wednesday -->

    <div class="column">

      <h2>Wednesday</h2>

      <div class="task-list" id="wednesday"></div>

    </div>

    <!-- Thursday -->

    <div class="column">

      <h2>Thursday</h2>

      <div class="task-list" id="thursday"></div>

    </div>
    <!-- Friday -->

    <div class="column">

      <h2>Friday</h2>

      <div class="task-list" id="friday"></div>

    </div>
    <!-- Saturday -->

    <div class="column">

      <h2>Saturday</h2>

      <div class="task-list" id="saturday"></div>

    </div>
    <!-- Sunday -->

    <div class="column">

      <h2>Sunday</h2>

      <div class="task-list" id="sunday"></div>

    </div>

  </section>

  <!-- Popup -->

  <div class="popup" id="popup">

    <div class="popup-content">

      <h2>Add New Task</h2>

      <input type="text" id="taskInput" placeholder="Enter task">

      <select id="daySelect">

        <option value="monday">Monday</option>
        <option value="tuesday">Tuesday</option>
        <option value="wednesday">Wednesday</option>
        <option value="thursday">Thursday</option>
        <option value="friday">Friday</option>
        <option value="saturday">Saturday</option>
        <option value="sunday">Sunday</option>

      </select>

      <select id="prioritySelect">

        <option value="high">High Priority</option>
        <option value="medium">Medium Priority</option>
        <option value="low">Low Priority</option>

      </select>

      <div class="popup-buttons">

        <button id="saveTask">Save</button>

        <button id="closePopup">Cancel</button>

      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
